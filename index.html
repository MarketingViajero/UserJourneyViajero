<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viajero Hostels — User Journey 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    /* Viajero Brand Palette */
    --vj-cream: #F5F0E8;
    --vj-warm-white: #FBF8F3;
    --vj-sand: #E8DDD0;
    --vj-tan: #C9B99F;
    --vj-brown: #B84E15;
    --vj-dark-brown: #7A2E06;
    --vj-charcoal: #2D2926;
    --vj-coral: #C8513A;
    --vj-coral-light: #F2E0DA;
    --vj-gold: #E8722A;
    --vj-gold-light: #FDEEE5;
    --vj-green: #3D7A5C;
    --vj-green-light: #DFF0E8;
    --vj-blue: #2E6FA3;
    --vj-blue-light: #DFF0FF;
    --vj-purple: #5C4AB8;
    --vj-purple-light: #EEEAFF;

    /* Semantic aliases */
    --amber-50: #FDEEE5; --amber-100: #F5C4A0; --amber-400: #E8722A; --amber-600: #B84E15; --amber-800: #7A2E06;
    --teal-50: #DFF0E8; --teal-400: #3D7A5C; --teal-600: #2A5E44; --teal-800: #1A3E2D;
    --coral-50: #F2E0DA; --coral-400: #C8513A; --coral-600: #963020;
    --purple-50: #EEEAFF; --purple-400: #5C4AB8; --purple-600: #3D2E9C;
    --blue-50: #DFF0FF; --blue-400: #2E6FA3; --blue-600: #1B4F7A;
    --gray-50: #EDE8E2; --gray-100: #C9B99F; --gray-400: #8B7A68; --gray-600: #5C4A38;
    --green-50: #DFF0E8; --green-400: #3D7A5C; --green-600: #2A5E44;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--vj-warm-white);
    color: var(--vj-charcoal);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--vj-charcoal);
    color: var(--vj-warm-white);
    padding: 1.5rem 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--vj-gold);
  }
  .header-brand { display: flex; align-items: center; gap: 20px; }
  .header-logo-wrap { flex-shrink: 0; }
  .header-logo {
    height: 48px;
    width: auto;
    display: block;
    filter: brightness(0) invert(1);
    opacity: 0.92;
  }
  .header-title-block { display: flex; flex-direction: column; gap: 2px; border-left: 1px solid rgba(255,255,255,0.15); padding-left: 20px; }
  .header-eyebrow { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--vj-gold); font-weight: 600; }
  .header-title { font-family: 'Montserrat', sans-serif; font-size: 1.8rem; line-height: 1.1; font-weight: 800; letter-spacing: -0.02em; }
  .header-title em { font-style: italic; color: var(--amber-100); font-weight: 300; }
  .header-meta { text-align: right; font-size: 11px; color: rgba(255,255,255,0.45); line-height: 1.8; }
  .header-meta strong { color: rgba(255,255,255,0.75); font-weight: 600; }

  /* STATS BAR */
  .stats-bar {
    background: var(--vj-dark-brown);
    padding: 1rem 3rem;
    display: flex;
    gap: 2rem;
    align-items: center;
    overflow-x: auto;
  }
  .stat-pill {
    display: flex; align-items: center; gap: 8px;
    white-space: nowrap;
  }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .stat-label { font-size: 11px; color: #888780; text-transform: uppercase; letter-spacing: 0.1em; }
  .stat-val { font-size: 15px; font-weight: 600; color: #FAF8F3; }
  .stat-sep { width: 1px; height: 24px; background: #444441; flex-shrink: 0; }

  /* FILTERS */
  .controls {
    padding: 0;
    background: var(--vj-cream);
    border-bottom: 1px solid var(--vj-sand);
    display: flex;
    flex-direction: column;
  }
  .controls-row {
    padding: 0.65rem 3rem;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .controls-row--top {
    padding: 0.75rem 3rem;
    justify-content: space-between;
    background: white;
    border-bottom: 1px solid var(--vj-sand);
  }
  .controls-row-left { display: flex; align-items: center; gap: 10px; }
  .controls-row-right { display: flex; align-items: center; gap: 10px; }
  .controls-divider { display: none; }
  .controls-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--gray-400); font-weight: 700;
    min-width: 62px; flex-shrink: 0;
  }
  .filter-group { display: flex; gap: 5px; flex-wrap: wrap; }
  /* Colored chip variants for objectives */
  .chip--brandlove.active { background: #DFF0E8; border-color: #3D7A5C; color: #2A5E44; }
  .chip--upselling.active { background: #FDEEE5; border-color: #E8722A; color: #B84E15; }
  .chip--h2h.active { background: #DFF0FF; border-color: #2E6FA3; color: #1B4F7A; }
  .chip--ingresos.active { background: #FFF8DC; border-color: #B8960A; color: #7A6000; }
  .chip--ab.active { background: #FDEEE5; border-color: #E8722A; color: #B84E15; }
  .chip--loyalty.active { background: #F0E8FF; border-color: #5C4AB8; color: #3D2E9C; }
  .chip--legales.active { background: #DFF0FF; border-color: #2E6FA3; color: #1B4F7A; }
  .chip {
    padding: 5px 14px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 500;
    border: 1.5px solid var(--vj-tan);
    background: white;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--vj-brown);
  }
  .chip:hover { border-color: var(--vj-gold); color: var(--vj-dark-brown); background: var(--vj-gold-light); }
  .chip.active { background: var(--vj-charcoal); border-color: var(--vj-charcoal); color: white; }

  /* VIEW TOGGLE */
  .view-toggle { margin-left: auto; display: flex; gap: 4px; }
  .vtbtn {
    padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 500;
    border: 1.5px solid var(--vj-tan); background: white; cursor: pointer; color: var(--vj-brown);
  }
  .vtbtn.active { background: var(--vj-charcoal); color: white; border-color: var(--vj-charcoal); }

  /* MAIN */
  .main { padding: 2rem 3rem; }

  /* PHASE SECTIONS */
  .phase-block { margin-bottom: 2.5rem; }
  .phase-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 2px solid;
  }
  .phase-header.pre { border-color: var(--blue-400); }
  .phase-header.durante { border-color: var(--amber-400); }
  .phase-header.post { border-color: var(--teal-400); }
  .phase-icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Instrument Serif', serif;
    font-size: 14px; font-weight: bold;
    flex-shrink: 0;
  }
  .pre .phase-icon { background: var(--blue-50); color: var(--blue-600); }
  .durante .phase-icon { background: var(--amber-50); color: var(--amber-800); }
  .post .phase-icon { background: var(--teal-50); color: var(--teal-600); }
  .phase-title { font-family: 'Instrument Serif', serif; font-size: 1.25rem; }
  .phase-count { margin-left: auto; font-size: 12px; color: var(--gray-400); font-weight: 500; background: var(--gray-50); border-radius: 99px; padding: 3px 12px; }

  /* HITO CARDS */
  .hito-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }
  .hito-card {
    background: white;
    border: 1px solid var(--vj-sand);
    border-radius: 12px;
    overflow: hidden;
    transition: box-shadow 0.2s, transform 0.15s;
    cursor: pointer;
  }
  .hito-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
  .hito-card.expanded { border-color: var(--vj-gold); border-left: 3px solid var(--vj-gold); }

  .hito-card-top {
    padding: 14px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .hito-num {
    font-size: 11px; font-weight: 600;
    width: 26px; height: 26px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .hito-body { flex: 1; min-width: 0; }
  .hito-name {
    font-size: 14px; font-weight: 500;
    line-height: 1.35;
    margin-bottom: 4px;
    color: #2C2C2A;
  }
  .hito-location { font-size: 11px; color: var(--gray-400); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* BADGES ROW */
  .hito-badges {
    padding: 0 16px 12px;
    display: flex; gap: 5px; flex-wrap: wrap;
  }
  .badge {
    font-size: 10px; font-weight: 600;
    padding: 3px 8px; border-radius: 99px;
    letter-spacing: 0.03em;
  }
  .badge-format { background: var(--gray-50); color: var(--gray-600); }
  .badge-area { background: var(--purple-50); color: var(--purple-600); }
  .badge-obj { background: var(--amber-50); color: var(--amber-800); }
  .badge-brandlove { background: var(--coral-50); color: var(--coral-600); }
  .badge-upselling { background: var(--green-50); color: var(--green-600); }
  .badge-h2h { background: var(--blue-50); color: var(--blue-600); }
  .badge-legales { background: #FEF2F2; color: #991F1F; }
  .badge-ops { background: var(--teal-50); color: var(--teal-600); }

  /* STATUS */
  .hito-status {
    padding: 8px 16px;
    border-top: 1px solid #F1EFE8;
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px;
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .status-implementado .status-dot { background: var(--teal-400); }
  .status-propuesta .status-dot { background: var(--amber-400); }
  .status-aprobado .status-dot { background: var(--green-400); }
  .status-revision .status-dot { background: var(--coral-400); }
  .status-pendiente .status-dot { background: #D3D1C7; }
  .status-label { font-size: 11px; font-weight: 500; }
  .status-implementado .status-label { color: var(--teal-600); }
  .status-propuesta .status-label { color: var(--amber-800); }
  .status-aprobado .status-label { color: var(--green-600); }
  .status-revision .status-label { color: var(--coral-600); }
  .status-pendiente .status-label { color: var(--gray-400); }

  .expand-arrow { font-size: 14px; color: var(--gray-400); transition: transform 0.2s; }
  .hito-card.expanded .expand-arrow { transform: rotate(180deg); color: var(--vj-gold); }

  /* EXPANDED DETAIL */
  .hito-detail {
    display: none;
    padding: 12px 16px;
    border-top: 1px solid var(--vj-sand);
    background: #FEFBF7;
  }
  .hito-card.expanded .hito-detail { display: block; }
  .detail-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: flex-start; }
  .detail-icon { font-size: 13px; color: var(--gray-400); width: 16px; flex-shrink: 0; margin-top: 1px; }
  .detail-key { font-size: 11px; font-weight: 600; color: var(--gray-600); text-transform: uppercase; letter-spacing: 0.05em; min-width: 70px; flex-shrink: 0; }
  .detail-val { font-size: 12px; color: #2C2C2A; line-height: 1.4; }
  .copy-before {
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--gray-50);
    border-radius: 8px;
    border-left: 3px solid var(--vj-gold);
    font-size: 12px;
    line-height: 1.5;
    font-style: italic;
    color: #444441;
  }
  .copy-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gray-400); font-weight: 600; margin-bottom: 4px; font-style: normal; }

  /* TIMELINE VIEW */
  .timeline-view { display: none; }
  .timeline-view.active { display: block; }
  .grid-view.hidden { display: none; }

  .timeline-phase { margin-bottom: 2rem; }
  .tl-phase-label {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.15em; color: var(--gray-400); margin-bottom: 10px;
  }
  .timeline-strip {
    display: flex;
    gap: 0;
    overflow-x: auto;
    padding-bottom: 8px;
  }
  .tl-item {
    flex-shrink: 0;
    width: 160px;
    border: 1px solid var(--vj-sand);
    border-right: none;
    background: white;
    padding: 10px 12px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .tl-item:first-child { border-radius: 8px 0 0 8px; }
  .tl-item:last-child { border-right: 1px solid #D3D1C7; border-radius: 0 8px 8px 0; }
  .tl-item:hover { background: #FFFDF9; }
  .tl-item-num { font-size: 10px; font-weight: 700; color: var(--amber-600); margin-bottom: 4px; }
  .tl-item-name { font-size: 11px; color: #2C2C2A; line-height: 1.35; }
  .tl-item-loc { font-size: 10px; color: var(--gray-400); margin-top: 3px; }
  .tl-dot {
    position: absolute; bottom: -5px; left: 50%;
    transform: translateX(-50%);
    width: 8px; height: 8px; border-radius: 50%; border: 2px solid white;
  }

  /* LEGEND */
  .legend {
    display: flex; gap: 1.5rem; flex-wrap: wrap;
    padding: 1rem 3rem;
    background: var(--vj-cream);
    border-top: 1px solid var(--vj-sand);
    border-bottom: 1px solid var(--vj-sand);
    margin-bottom: 0;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--gray-600); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* SEARCH */
  .search-wrap { position: relative; }
  .search-input {
    padding: 7px 12px 7px 32px;
    border: 1.5px solid var(--vj-tan);
    border-radius: 8px;
    font-size: 13px;
    font-family: 'Montserrat', sans-serif;
    background: white;
    color: var(--vj-charcoal);
    width: 200px;
  }
  .search-input:focus { outline: none; border-color: var(--vj-gold); }
  .search-icon {
    position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
    font-size: 14px; color: var(--gray-400); pointer-events: none;
  }

  /* EMPTY */
  .empty-state { text-align: center; padding: 3rem; color: var(--gray-400); font-size: 14px; }

  /* SCROLL HINT */
  .scroll-hint {
    font-size: 11px; color: var(--gray-400);
    display: flex; align-items: center; gap: 4px; margin-bottom: 6px;
  }


  /* LIGHTBOX */
  .vj-lightbox {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.88);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    padding: 24px;
    cursor: zoom-out;
  }
  .vj-lightbox.open { display: flex; }
  .vj-lightbox img {
    max-width: 92vw;
    max-height: 88vh;
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    object-fit: contain;
    cursor: auto;
  }
  .vj-lightbox-close {
    position: fixed;
    top: 16px; right: 20px;
    color: white;
    font-size: 28px;
    cursor: pointer;
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 50%;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .vj-lightbox-close:hover { background: rgba(255,255,255,0.2); }

  /* COPY COMPARISON */
  .copy-compare-wrap {
    margin-top: 14px;
    border-top: 1px dashed var(--vj-sand);
    padding-top: 12px;
  }
  .copy-compare-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--gray-400); margin-bottom: 10px;
  }
  .copy-compare-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .copy-compare-col { display: flex; flex-direction: column; gap: 6px; }
  .copy-compare-col-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; padding: 3px 8px; border-radius: 4px;
    text-align: center;
  }
  .copy-compare-col-label.before {
    background: var(--gray-50); color: var(--gray-600);
    border: 1px solid var(--vj-tan);
  }
  .copy-compare-col-label.after {
    background: var(--vj-gold-light); color: var(--vj-dark-brown);
    border: 1px solid var(--amber-100);
  }
  .copy-compare-textarea {
    width: 100%;
    min-height: 80px;
    border-radius: 6px;
    border: 1px solid var(--vj-sand);
    padding: 8px 10px;
    font-size: 11px;
    font-family: 'Montserrat', sans-serif;
    line-height: 1.5;
    color: var(--vj-charcoal);
    background: white;
    resize: vertical;
    transition: border-color 0.15s;
  }
  .copy-compare-textarea:focus {
    outline: none;
    border-color: var(--vj-gold);
  }
  .copy-compare-textarea::placeholder { color: var(--gray-400); font-style: italic; }

  /* IMAGE COMPARISON */
  .img-compare-wrap {
    margin-top: 14px;
    border-top: 1px dashed var(--vj-sand);
    padding-top: 12px;
  }
  .img-compare-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--gray-400); margin-bottom: 10px;
  }
  .img-compare-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .img-compare-col { display: flex; flex-direction: column; gap: 6px; }
  .img-compare-col-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; padding: 3px 8px; border-radius: 4px;
    text-align: center;
  }
  .img-compare-col-label.before {
    background: var(--gray-50); color: var(--gray-600);
    border: 1px solid var(--vj-sand);
  }
  .img-compare-col-label.after {
    background: var(--vj-gold-light); color: var(--vj-dark-brown);
    border: 1px solid var(--amber-100);
  }

  /* UPLOAD ZONE */
  .img-upload-zone {
    position: relative;
    width: 100%;
    min-height: 160px;
    border: 2px dashed var(--vj-tan);
    border-radius: 8px;
    background: #FAFAF8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    overflow: hidden;
  }
  .img-upload-zone:hover {
    border-color: var(--vj-gold);
    background: var(--vj-gold-light);
  }
  .img-upload-zone.has-image {
    border-style: solid;
    border-color: var(--vj-tan);
    min-height: unset;
  }
  .img-upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  .img-upload-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    pointer-events: none;
  }
  .img-upload-icon {
    font-size: 28px;
    line-height: 1;
  }
  .img-upload-text {
    font-size: 11px;
    font-weight: 600;
    color: var(--vj-brown);
    text-align: center;
  }
  .img-upload-hint {
    font-size: 10px;
    color: var(--gray-400);
    text-align: center;
  }
  .img-upload-preview {
    display: none;
    width: 100%;
    border-radius: 6px;
    object-fit: contain;
    max-height: 260px;
    background: white;
    cursor: zoom-in;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .img-upload-preview:hover {
    transform: scale(1.01);
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  }
  .img-upload-zone.has-image .img-upload-placeholder { display: none; }
  .img-upload-zone.has-image .img-upload-preview { display: block; }
  .img-upload-zone.has-image input[type="file"] { cursor: pointer; }
  .img-upload-change-btn {
    display: none;
    position: absolute;
    bottom: 8px; right: 8px;
    background: rgba(0,0,0,0.55);
    color: white;
    font-size: 10px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    pointer-events: none;
    letter-spacing: 0.05em;
  }
  .img-upload-zone.has-image .img-upload-change-btn { display: block; }

  @media (max-width: 768px) {
    .header, .main, .legend { padding-left: 1.25rem; padding-right: 1.25rem; }
    .controls-row, .controls-row--top { padding-left: 1.25rem; padding-right: 1.25rem; }

function getStatusClass(copy, visual) {
  const combined = [copy, visual].join(' ').toLowerCase();
  if (combined.includes('implementado')) return 'implementado';
  if (combined.includes('aprobado')) return 'aprobado';
  if (combined.includes('revisión') || combined.includes('revision')) return 'revision';
  if (combined.includes('propuesta')) return 'propuesta';
  return 'pendiente';
}
function getStatusLabel(copy, visual) {
  const labels = { implementado: 'Implementado', aprobado: 'Aprobado', revision: 'En revisión', propuesta: 'Propuesta', pendiente: 'Pendiente' };
  return labels[getStatusClass(copy, visual)];
}
function getObjBadgeClass(obj) {
  if (!obj) return 'badge-format';
  if (obj === 'BrandLove') return 'badge-brandlove';
  if (obj === 'Upselling') return 'badge-upselling';
  if (obj === 'H2H') return 'badge-h2h';
  if (obj === 'Legales') return 'badge-legales';
  if (obj === 'Otros Ingresos') return 'badge-obj';
  if (obj === 'A&B') return 'badge-ab';
  if (obj === 'Loyalty') return 'badge-loyalty';
  return 'badge-ops';
}
function getFaseColor(fase) {
  if (fase === 'pre') return '#378ADD';
  if (fase === 'durante') return '#E8722A';
  return '#1D9E75';
}
function getHitoColor(h) {
  const cols = ['#7F77DD','#E8722A','#D85A30','#1D9E75','#D4537E','#378ADD','#639922','#854F0B','#185FA5','#993C1D'];
  return cols[(h - 1) % cols.length];
}

let activePhase = 'all', activeObj = 'all', activeEsp = 'all', searchTerm = '';

function filterData() {
  return data.filter(d => {
    const phaseOk = activePhase === 'all' || d.fase === activePhase;
    const objOk = activeObj === 'all' || d.objetivo === activeObj;
    const espOk = activeEsp === 'all' || (d.fuente||'').toLowerCase().includes(activeEsp.toLowerCase()) || (d.ubicacion||'').toLowerCase().includes(activeEsp.toLowerCase());
    const q = searchTerm.toLowerCase();
    const searchOk = !q || d.nombre.toLowerCase().includes(q) || d.formato.toLowerCase().includes(q) || (d.ubicacion||'').toLowerCase().includes(q) || (d.area||'').toLowerCase().includes(q) || (d.objetivo||'').toLowerCase().includes(q);
    return phaseOk && objOk && espOk && searchOk;
  });
}

function buildStats(filtered) {
  const total = data.length;
  const vis = filtered.length;
  const impl = filtered.filter(d => getStatusClass(d.estado_copy, d.estado_visual) === 'implementado').length;
  const prop = filtered.filter(d => getStatusClass(d.estado_copy, d.estado_visual) === 'propuesta').length;
  const pend = filtered.filter(d => getStatusClass(d.estado_copy, d.estado_visual) === 'pendiente').length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-pill"><span class="stat-dot" style="background:#E8722A;"></span><span class="stat-label">Piezas visibles</span><span class="stat-val">${vis}</span></div>
    <div class="stat-sep"></div>
    <div class="stat-pill"><span class="stat-dot" style="background:#1D9E75;"></span><span class="stat-label">Implementadas</span><span class="stat-val">${impl}</span></div>
    <div class="stat-sep"></div>
    <div class="stat-pill"><span class="stat-dot" style="background:#E8722A;"></span><span class="stat-label">Propuesta</span><span class="stat-val">${prop}</span></div>
    <div class="stat-sep"></div>
    <div class="stat-pill"><span class="stat-dot" style="background:#D3D1C7;"></span><span class="stat-label">Pendientes</span><span class="stat-val">${pend}</span></div>
    <div class="stat-sep"></div>
    <div class="stat-pill"><span class="stat-dot" style="background:#534AB7;"></span><span class="stat-label">Total journey</span><span class="stat-val">${total}</span></div>
  `;
}

  const imgCompareHtml = `

            <div class="img-upload-placeholder">
              <div class="img-upload-icon">🖼️</div>

        </div>
        <div class="img-compare-col">

          <div class="img-upload-zone" id="zone_after_${cardId}" onclick="triggerUpload(event, 'after_${cardId}')">
            <input type="file" id="file_after_${cardId}" accept="image/*" onchange="handleImageUpload(this, 'zone_after_${cardId}', 'preview_after_${cardId}')" onclick="event.stopPropagation()">
            <div class="img-upload-placeholder">
              <div class="img-upload-icon">🖼️</div>
              <div class="img-upload-text">Subir foto</div>
              <div class="img-upload-hint">Haz clic o arrastra una imagen</div>
            </div>
            <img class="img-upload-preview" id="preview_after_${cardId}" src="" alt="Propuesta 2026" onclick="openPreviewLightbox(this)">

  return `<div class="hito-card" data-card-id="${cardId}" onclick="toggleCard(this, event)">
    <div class="hito-card-top">
      <div class="hito-num" style="background:${hc}22;color:${hc};">${item.hito}</div>
      <div class="hito-body">
        <div class="hito-name">${item.nombre}</div>

}

function renderGrid() {
  const filtered = filterData();
  buildStats(filtered);
  const phases = [
    { key: 'pre', label: 'Pre-llegada', icon: '✈', cls: 'pre' },
    { key: 'durante', label: 'Durante la estadía', icon: '🏡', cls: 'durante' },
    { key: 'post', label: 'Post estadía', icon: '💌', cls: 'post' },
  ];
  let html = '';
  phases.forEach(ph => {
    const items = filtered.filter(d => d.fase === ph.key);
    if (!items.length) return;
    const etapas = {};
    items.forEach(d => { if (!etapas[d.etapa]) etapas[d.etapa] = []; etapas[d.etapa].push(d); });
    html += `<div class="phase-block">
      <div class="phase-header ${ph.cls}">
        <div class="phase-icon">${ph.icon}</div>
        <h2 class="phase-title">${ph.label}</h2>
        <span class="phase-count">${items.length} piezas</span>
      </div>`;
    Object.entries(etapas).forEach(([etapa, etItems]) => {
      html += `<div style="margin-bottom:1.25rem;">
        <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:#888780;margin-bottom:8px;padding-left:2px;">Hito ${etItems[0].hito} — ${etapa}</div>
        <div class="hito-grid">${etItems.map(buildCard).join('')}</div>
      </div>`;
    });
    html += '</div>';
  });
  if (!html) html = '<div class="empty-state">No se encontraron piezas con ese filtro.</div>';
  document.getElementById('mainContent').innerHTML = html;
}

function renderTimeline() {
  const filtered = filterData();
  const phases = [
    { key: 'pre', label: 'PRE — Llegada' },
    { key: 'durante', label: 'DURANTE — Estadía' },
    { key: 'post', label: 'POST — Salida' },
  ];
  const hitoColors = {};
  let html = '';
  phases.forEach(ph => {
    const items = filtered.filter(d => d.fase === ph.key);
    if (!items.length) return;
    const hitos = {};
    items.forEach(d => { if (!hitos[d.hito]) hitos[d.hito] = { etapa: d.etapa, items: [] }; hitos[d.hito].items.push(d); });
    const fc = getFaseColor(ph.key);
    html += `<div class="timeline-phase">
      <div class="tl-phase-label" style="color:${fc};">${ph.label} — ${items.length} piezas</div>
      <div class="scroll-hint">← Desliza para ver todos los hitos →</div>
      <div class="timeline-strip">`;
    Object.entries(hitos).forEach(([hnum, hdata]) => {
      const hc = getHitoColor(parseInt(hnum));
      const impls = hdata.items.filter(x => getStatusClass(x.estado_copy,x.estado_visual)==='implementado').length;
      html += `<div class="tl-item">
        <div class="tl-item-num" style="color:${hc};">Hito ${hnum}</div>
        <div class="tl-item-name">${hdata.etapa}</div>
        <div class="tl-item-loc" style="margin-top:4px;">${hdata.items.length} piezas${impls ? ` · ${impls} ✓` : ''}</div>
        <div class="tl-dot" style="background:${hc};"></div>
      </div>`;
    });
    html += '</div></div>';
  });
  document.getElementById('timelineView').innerHTML = html;
}

// GOOGLE SHEETS + DRIVE INTEGRATION via Apps Script

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwnSi0wZtZhBhVqMJZ1jDHMhcowYZB4G3KtfxkqPAJXcU-9uPt51XZe9vlksS0xlSJb/exec";

// Save copy text to Google Sheets
async function saveCopyToSheet(cardId, field, value) {
  try {
    const payload = { action: 'saveCopy', cardId };
    payload[field] = value;
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.ok) showSaveIndicator("✓ Copy guardado");
    else showSaveIndicator("⚠ Error: " + data.error);
  } catch(e) {
    console.warn("Copy save error:", e);
    showSaveIndicator("⚠ No se pudo guardar el copy");
  }
}

// Upload image to Google Drive, save URL to Sheets
async function saveImageToDrive(cardId, field, base64, filename, mimeType) {
  try {
    showSaveIndicator("⏳ Subiendo imagen...");
    // Step 1: upload to Drive
    const uploadRes = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action: "uploadImage",
        cardId, field, base64, filename, mimeType
      })
    });
    const uploadData = await uploadRes.json();
    if (!uploadData.ok) throw new Error(uploadData.error);
    // Step 2: save URL to sheet
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action: "saveImageUrl",
        cardId, field, url: uploadData.url
      })
    });
    showSaveIndicator("✓ Imagen guardada en Drive");
    return uploadData.url;
  } catch(e) {
    console.warn("Image upload error:", e);
    showSaveIndicator("⚠ No se pudo guardar la imagen");
    return null;
  }
}

// Load all saved data from Sheets
async function loadFromSheet() {
  try {
    const res = await fetch(APPS_SCRIPT_URL + "?t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    return await res.json();
  } catch(e) {
    console.warn("Load error:", e);
    return {};
  }
}

function showSaveIndicator(msg) {
  let el = document.getElementById("vj-save-toast");
  if (!el) {
    el = document.createElement("div");
    el.id = "vj-save-toast";
    el.style.cssText = "position:fixed;bottom:24px;right:24px;background:var(--vj-charcoal);color:white;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:600;z-index:9998;transition:opacity 0.4s;font-family:Montserrat,sans-serif;box-shadow:0 4px 16px rgba(0,0,0,0.25);";
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = "1";
  clearTimeout(window._toastTimer);
  if (!msg.startsWith("⏳")) {
    window._toastTimer = setTimeout(function() { el.style.opacity = "0"; }, 3000);
  }
}

function autoSaveField(cardId, field, value) {
  if (!value.trim()) return; // Don't save empty fields
  const payload = { action: 'saveCopy', cardId };
  payload[field] = value;
  fetch(APPS_SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  })
  .then(r => r.json())
  .then(data => {
    if (data.ok) showSaveIndicator("✓ Copy guardado");
    else showSaveIndicator("⚠ Error: " + (data.error || 'desconocido'));
  })
  .catch(e => {
    console.warn("Copy save error:", e);
    showSaveIndicator("⚠ No se pudo guardar");
  });
}

function autoSaveImage(cardId, field, base64, filename, mimeType) {
  saveImageToDrive(cardId, field, base64, filename, mimeType);
}

window._savedData = {};

async function initSheetData() {
  const loadingEl = document.getElementById("vj-loading");
  try {
    if (loadingEl) loadingEl.style.display = "flex";
    window._savedData = await loadFromSheet();
  } catch(e) {
    console.warn("Could not load saved data:", e);
    window._savedData = {};
  } finally {
    if (loadingEl) loadingEl.style.display = "none";
  }
}

// Apply saved data to a card after it's rendered
function applySavedData(cardId) {
  const saved = window._savedData[cardId];
  if (!saved) return;
  const taAnterior = document.querySelector('[data-card="' + cardId + '"][data-field="copyAnterior"]');
  const ta2026 = document.querySelector('[data-card="' + cardId + '"][data-field="copy2026"]');
  if (taAnterior && saved.copyAnterior) taAnterior.value = saved.copyAnterior;
  if (ta2026 && saved.copy2026) ta2026.value = saved.copy2026;
  if (saved.imgAnterior) {
    const zoneB = document.getElementById('zone_before_' + cardId);
    const previewB = document.getElementById('preview_before_' + cardId);
    if (zoneB && previewB) { previewB.src = saved.imgAnterior; zoneB.classList.add('has-image'); }
  }
  if (saved.img2026) {
    const zoneA = document.getElementById('zone_after_' + cardId);
    const previewA = document.getElementById('preview_after_' + cardId);
    if (zoneA && previewA) { previewA.src = saved.img2026; zoneA.classList.add('has-image'); }
  }
}

function toggleCard(el, event) {
  if (event && (event.target.tagName === 'TEXTAREA' || event.target.tagName === 'INPUT' || event.target.closest('.img-upload-zone') || event.target.classList.contains('img-upload-preview'))) return;
  const wasExpanded = el.classList.contains('expanded');
  el.classList.toggle('expanded');
  // When opening, restore saved data
  if (!wasExpanded) {
    const cardId = el.dataset.cardId;
    if (cardId) setTimeout(() => applySavedData(cardId), 50);
  }
}

<div class="vj-lightbox" id="vjLightbox">

<script>
// Image upload handlers
function triggerUpload(event, fileId) {
  // Only trigger if clicking on the zone itself (not the preview or input)
  if (event.target.tagName === 'INPUT') return;
  if (event.target.classList.contains('img-upload-preview')) return;
  const fileInput = document.getElementById('file_' + fileId);
  if (fileInput) fileInput.click();
}

function handleImageUpload(input, zoneId, previewId) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const zone = document.getElementById(zoneId);
    const preview = document.getElementById(previewId);
    if (zone && preview) {
      preview.src = e.target.result;
      zone.classList.add('has-image');
      // Extract cardId and field from zone ID
      const parts = zoneId.replace('zone_','').split('_');
      const side = parts[0]; // 'before' or 'after'
      const cardId = parts.slice(1).join('_');
      const field = side === 'before' ? 'imgAnterior' : 'img2026';
      const filename = cardId + '_' + field + '.' + (file.name.split('.').pop() || 'jpg');
      autoSaveImage(cardId, field, e.target.result, filename, file.type);
    }
  };
  reader.readAsDataURL(file);
}

// Drag & drop support
document.body.addEventListener('dragover', function(e) {
  const zone = e.target.closest('.img-upload-zone');
  if (zone) {
    e.preventDefault();
    zone.style.borderColor = 'var(--vj-gold)';
    zone.style.background = 'var(--vj-gold-light)';
  }
});
document.body.addEventListener('dragleave', function(e) {
  const zone = e.target.closest('.img-upload-zone');
  if (zone && !zone.contains(e.relatedTarget)) {
    zone.style.borderColor = '';
    zone.style.background = '';
  }
});
document.body.addEventListener('drop', function(e) {
  const zone = e.target.closest('.img-upload-zone');
  if (!zone) return;
  e.preventDefault();
  zone.style.borderColor = '';
  zone.style.background = '';
  const file = e.dataTransfer.files[0];
  if (!file || !file.type.startsWith('image/')) return;
  // Find the preview inside this zone
  const preview = zone.querySelector('.img-upload-preview');
  if (!preview) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    preview.src = ev.target.result;
    zone.classList.add('has-image');
  };
  reader.readAsDataURL(file);
});

// Lightbox logic
(function() {
  const lb = document.getElementById('vjLightbox');
  const lbImg = document.getElementById('vjLightboxImg');
  const lbClose = document.getElementById('vjLightboxClose');
  window.openPreviewLightbox = function(imgEl) {
    lbImg.src = imgEl.src;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  };
  function closeLightbox() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
    lbImg.src = '';
  }
  lb.addEventListener('click', function(e) { if (e.target === lb) closeLightbox(); });
  lbClose.addEventListener('click', closeLightbox);
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLightbox(); });
})();
</script>
